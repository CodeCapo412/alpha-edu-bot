<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Alpha Ethiopian Education</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F4F6F9;--surface:#FFFFFF;--border:#E5E9F0;
  --text:#0F1724;--text2:#4B5768;--text3:#9AA3B0;
  --blue:#1B4FD8;--blue2:#1E429F;--blue-light:#EEF2FF;--blue-mid:#3B71CA;
  --green:#057A55;--green-light:#ECFDF5;
  --orange:#C05621;--orange-light:#FFF7ED;
  --purple:#6C2BD9;--purple-light:#F5F3FF;
  --red:#C81E1E;--red-light:#FEF2F2;
  --s1:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --s2:0 4px 16px rgba(0,0,0,.08),0 1px 4px rgba(0,0,0,.04);
  --r:12px;--r2:8px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* NAV */
.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;height:56px;position:sticky;top:0;z-index:200;gap:10px}
.nav-logo{width:34px;height:34px;background:var(--blue);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:17px;color:#fff;flex-shrink:0;box-shadow:0 2px 8px rgba(27,79,216,.35)}
.nav-name{font-size:14px;font-weight:700;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-pill{background:var(--blue-light);color:var(--blue);font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;flex-shrink:0}

/* SEARCH */
.search-wrap{padding:14px 16px 0}
.search-inner{display:flex;align-items:center;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:0 12px;gap:8px;transition:border-color .2s}
.search-inner:focus-within{border-color:var(--blue)}
.search-inner input{flex:1;border:none;outline:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);padding:10px 0}
.search-inner input::placeholder{color:var(--text3)}

/* CHIPS */
.chips-wrap{padding:12px 16px 0}
.chips-label{font-size:10px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;color:var(--text3);margin-bottom:7px}
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .18s;white-space:nowrap}
.chip:active{transform:scale(.96)}
.chip.on-grade{background:var(--blue);border-color:var(--blue);color:#fff}
.chip.on-Math{background:var(--blue);border-color:var(--blue);color:#fff}
.chip.on-Physics{background:var(--orange);border-color:var(--orange);color:#fff}
.chip.on-Chemistry{background:var(--purple);border-color:var(--purple);color:#fff}
.chip.on-Biology{background:var(--green);border-color:var(--green);color:#fff}
.chip.on-all{background:var(--text);border-color:var(--text);color:#fff}

/* HERO */
.hero{margin:14px 16px 0;background:linear-gradient(135deg,var(--blue) 0%,var(--blue2) 100%);border-radius:var(--r);padding:22px 20px;color:#fff;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.06)}
.hero::after{content:'';position:absolute;bottom:-50px;right:30px;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.04)}
.hero-eyebrow{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;margin-bottom:10px}
.hero h2{font-family:'DM Serif Display',serif;font-size:21px;line-height:1.28;margin-bottom:7px;position:relative}
.hero p{font-size:13px;opacity:.82;line-height:1.5;position:relative}
.hero-nums{display:flex;gap:20px;margin-top:16px;position:relative}
.hnum{display:flex;flex-direction:column;gap:1px}
.hnum-n{font-size:20px;font-weight:700;line-height:1}
.hnum-l{font-size:10px;opacity:.7;letter-spacing:.3px}

/* GRADE SCROLLER */
.section{padding:20px 16px 0}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-title{font-size:16px;font-weight:700}
.sec-count{font-size:12px;color:var(--text3);font-weight:500}
.grade-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.grade-row::-webkit-scrollbar{display:none}
.gcard{flex-shrink:0;width:110px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:14px 12px;cursor:pointer;transition:all .2s;box-shadow:var(--s1)}
.gcard:active{transform:scale(.97)}
.gcard.sel{border-color:var(--blue);background:var(--blue-light)}
.gcard-n{font-family:'DM Serif Display',serif;font-size:28px;color:var(--blue);line-height:1;margin-bottom:2px}
.gcard-lbl{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:7px}
.gcard-ct{font-size:11px;color:var(--text3)}
.gbar{height:3px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.gbar-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .4s}

/* SUBJECT DIVIDER */
.sub-hd{display:flex;align-items:center;gap:10px;padding:20px 16px 10px}
.sub-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sub-info h4{font-size:15px;font-weight:700;color:var(--text)}
.sub-info p{font-size:12px;color:var(--text3)}

/* VIDEO CARD */
.vlist{display:flex;flex-direction:column;gap:9px;padding:0 16px}
.vcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);display:flex;align-items:stretch;cursor:pointer;box-shadow:var(--s1);transition:box-shadow .2s,transform .15s;animation:up .32s ease both;overflow:hidden}
.vcard:active{transform:scale(.985);box-shadow:none}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.vcard-thumb{width:88px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px;position:relative}
.vcard-thumb.Math{background:linear-gradient(145deg,#EEF2FF,#C7D2FE)}
.vcard-thumb.Physics{background:linear-gradient(145deg,#FFF7ED,#FED7AA)}
.vcard-thumb.Chemistry{background:linear-gradient(145deg,#F5F3FF,#DDD6FE)}
.vcard-thumb.Biology{background:linear-gradient(145deg,#ECFDF5,#A7F3D0)}
.vcard-thumb.def{background:linear-gradient(145deg,#F0F2F5,#E4E7EC)}
.play-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.play-btn{width:28px;height:28px;background:rgba(255,255,255,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.15);font-size:9px;color:var(--blue);padding-left:2px}
.vcard-body{flex:1;padding:11px 13px 11px 11px;display:flex;flex-direction:column;gap:3px;min-width:0}
.vmeta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.vbadge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px}
.vbadge.Math{background:var(--blue-light);color:var(--blue)}
.vbadge.Physics{background:var(--orange-light);color:var(--orange)}
.vbadge.Chemistry{background:var(--purple-light);color:var(--purple)}
.vbadge.Biology{background:var(--green-light);color:var(--green)}
.vgrade{font-size:11px;color:var(--text3);font-weight:500}
.vunit{font-size:10px;color:var(--text3);letter-spacing:.3px}
.vtitle{font-size:13.5px;font-weight:600;color:var(--text);line-height:1.38;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.vwatch{margin-top:4px;font-size:12px;font-weight:600;color:var(--blue);display:flex;align-items:center;gap:3px}

/* EMPTY */
.empty{text-align:center;padding:52px 24px}
.empty-ico{font-size:42px;margin-bottom:12px}
.empty-t{font-size:16px;font-weight:700;margin-bottom:6px}
.empty-s{font-size:13px;color:var(--text3)}

/* LOADER */
.loader-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:70vh;gap:14px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-t{font-size:14px;color:var(--text3)}

.pad{height:36px}
</style>
</head>
<body>
<div id="root"><div class="loader-wrap"><div class="spinner"></div><p class="loader-t">Loading courses…</p></div></div>

<script>
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();}

const COURSES_URL='./courses.json';
let ALL=[],grade='all',sub='all',q='';

const ICON ={Math:'📐',Physics:'⚡',Chemistry:'🧪',Biology:'🌿',English:'📝'};
const COLOR={Math:'#1B4FD8',Physics:'#C05621',Chemistry:'#6C2BD9',Biology:'#057A55',English:'#C81E1E'};
const BG   ={Math:'#EEF2FF',Physics:'#FFF7ED',Chemistry:'#F5F3FF',Biology:'#ECFDF5',English:'#FEF2F2'};

function flatten(c){const o=[];for(const[g,ss]of Object.entries(c))for(const[s,us]of Object.entries(ss))for(const u of us)o.push({grade:g,subject:s,...u});return o;}
const grades=()=>[...new Set(ALL.map(v=>v.grade))].sort((a,b)=>+a-+b);
const subs  =()=>[...new Set(ALL.map(v=>v.subject))].sort();
const vis   =()=>ALL.filter(v=>{
  if(grade!=='all'&&v.grade!==grade)return false;
  if(sub!=='all'&&v.subject!==sub)return false;
  if(q&&!v.title.toLowerCase().includes(q.toLowerCase())&&!v.subject.toLowerCase().includes(q.toLowerCase()))return false;
  return true;
});

function openVideo(url){if(tg)tg.openLink(url);else window.open(url,'_blank');}

function gCard(g){
  const ct=ALL.filter(v=>v.grade===g).length;
  const mx=Math.max(...grades().map(gr=>ALL.filter(v=>v.grade===gr).length));
  return`<div class="gcard ${grade===g?'sel':''}" onclick="setGrade('${g}')">
    <div class="gcard-n">${g}</div>
    <div class="gcard-lbl">Grade</div>
    <div class="gcard-ct">${ct} videos</div>
    <div class="gbar"><div class="gbar-fill" style="width:${Math.round(ct/mx*100)}%"></div></div>
  </div>`;
}

function vCard(v,i){
  const clean=v.title.replace(/^Unit[\s\d\.]+:\s*/i,'');
  const unit=v.unit_no?`<div class="vunit">Unit ${v.unit_no}</div>`:'';
  return`<div class="vcard" style="animation-delay:${i*.04}s" onclick="openVideo('${v.url}')">
    <div class="vcard-thumb ${v.subject||'def'}">
      <span>${ICON[v.subject]||'📖'}</span>
      <div class="play-wrap"><div class="play-btn">▶</div></div>
    </div>
    <div class="vcard-body">
      <div class="vmeta">
        <span class="vbadge ${v.subject}">${v.subject}</span>
        <span class="vgrade">Grade ${v.grade}</span>
      </div>
      ${unit}
      <div class="vtitle">${clean}</div>
      <div class="vwatch">Watch lesson →</div>
    </div>
  </div>`;
}

function render(){
  const gs=grades(),ss=subs(),vids=vis(),total=ALL.length;

  const gChips=['all',...gs].map(g=>`<button class="chip ${grade===g?'on-grade':''}" onclick="setGrade('${g}')">${g==='all'?'All Grades':'Grade '+g}</button>`).join('');
  const sChips=['all',...ss].map(s=>`<button class="chip ${sub===s?'on-'+(s==='all'?'all':s):''}" onclick="setSub('${s}')">${s==='all'?'All Subjects':s}</button>`).join('');
  const gCards=gs.map(gCard).join('');

  let content='';
  if(vids.length===0){
    content=`<div class="empty"><div class="empty-ico">🔍</div><div class="empty-t">No lessons found</div><div class="empty-s">Try a different filter or search term</div></div>`;
  } else if(sub!=='all'){
    content=`<div class="section" style="padding-top:16px"><div class="sec-hd"><div class="sec-title">${sub} Lessons</div><div class="sec-count">${vids.length} videos</div></div></div><div class="vlist" style="padding-top:0">${vids.map((v,i)=>vCard(v,i)).join('')}</div>`;
  } else {
    const byS={};
    for(const v of vids){if(!byS[v.subject])byS[v.subject]=[];byS[v.subject].push(v);}
    content=Object.entries(byS).map(([s,vs])=>`
      <div class="sub-hd">
        <div class="sub-icon" style="background:${BG[s]||'#EEF2FF'};color:${COLOR[s]||'#1B4FD8'}">${ICON[s]||'📖'}</div>
        <div class="sub-info"><h4>${s}</h4><p>${vs.length} lessons</p></div>
      </div>
      <div class="vlist">${vs.map((v,i)=>vCard(v,i)).join('')}</div>
    `).join('');
  }

  document.getElementById('root').innerHTML=`
    <div class="nav">
      <div class="nav-logo">α</div>
      <div class="nav-name">Alpha Ethiopian Education</div>
      <div class="nav-pill">${total} Lessons</div>
    </div>
    <div class="search-wrap">
      <div class="search-inner">
        <span style="color:var(--text3);font-size:15px">🔍</span>
        <input type="text" placeholder="Search lessons or subjects…" value="${q}" oninput="doSearch(this.value)" autocomplete="off">
      </div>
    </div>
    <div class="chips-wrap">
      <div class="chips-label">Grade</div>
      <div class="chips">${gChips}</div>
    </div>
    <div class="chips-wrap" style="padding-top:10px">
      <div class="chips-label">Subject</div>
      <div class="chips">${sChips}</div>
    </div>
    <div class="hero">
      <div class="hero-eyebrow">🎓 Free High School Lessons</div>
      <h2>Elevate Your<br>Academic Journey</h2>
      <p>Master Math, Physics & Chemistry<br>with expert-led video lessons</p>
      <div class="hero-nums">
        <div class="hnum"><div class="hnum-n">${total}</div><div class="hnum-l">Videos</div></div>
        <div class="hnum"><div class="hnum-n">${gs.length}</div><div class="hnum-l">Grades</div></div>
        <div class="hnum"><div class="hnum-n">${ss.length}</div><div class="hnum-l">Subjects</div></div>
      </div>
    </div>
    <div class="section">
      <div class="sec-hd"><div class="sec-title">Browse by Grade</div></div>
      <div class="grade-row">${gCards}</div>
    </div>
    <div class="section" style="padding-bottom:6px">
      <div class="sec-hd">
        <div class="sec-title">${sub!=='all'?sub:grade!=='all'?'Grade '+grade+' Lessons':'All Lessons'}</div>
        <div class="sec-count">${vids.length} videos</div>
      </div>
    </div>
    ${content}
    <div class="pad"></div>
  `;
}

function setGrade(g){grade=g;render();window.scrollTo(0,0);}
function setSub(s){sub=s;render();window.scrollTo(0,0);}
function doSearch(v){q=v;render();}

async function init(){
  try{
    const r=await fetch(COURSES_URL);
    if(!r.ok)throw new Error();
    ALL=flatten(await r.json());
    render();
  }catch{
    document.getElementById('root').innerHTML=`<div class="loader-wrap"><p style="color:#C81E1E;font-size:14px;text-align:center">Could not load courses.<br>Check your connection.</p></div>`;
  }
}
init();
</script>
</body>
</html>
